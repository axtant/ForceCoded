spring:
  application:
    name: force

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/forcecoded}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: 86400000  # 24 hours

judge:
  problems-dir: ${PROBLEMS_DIR:/home/codeForced/problems}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

server:
  port: 8080

logging:
  level:
    com.code.force: INFO
    com.code.force.service.JudgeService: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
